<nav class="navbar">
  <a routerLink="/" class="brand">
    <span class="brand-icon">🎓</span>
    <span class="brand-name">PathlyAI</span>
  </a>
  <div class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
    <a routerLink="/upgrade" routerLinkActive="active">Pricing</a>
    @if (auth.isLoggedIn()) {
      <span class="nav-user">👤 {{ auth.currentUser()?.email }}</span>
      <button class="nav-logout" (click)="auth.logout()">Sign Out</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Sign In</a>
      <a routerLink="/register" [queryParams]="{plan:'pro'}" class="nav-cta">Get Started Free</a>
    }
  </div>
</nav>
